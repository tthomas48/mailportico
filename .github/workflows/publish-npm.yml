name: Publish npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm trusted publishing (OIDC) — see README
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # npm trusted publishing needs Node ≥ 22.14 + npm ≥ 11.5.1; Node 22.14.x
          # fails vite-plus loading root vite.config.ts (TS). Use current LTS line.
          node-version: '24'
          registry-url: https://registry.npmjs.org

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
          cache: true

      - name: Install
        run: pnpm install

      - name: Check
        run: pnpm exec vp check

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm exec vp test -- --run

      - name: Ensure npm supports trusted publishing
        run: npm install -g "npm@^11.5.1"

      - name: Publish to npm
        run: >-
          pnpm publish
          --filter @textportico/core
          --filter @textportico/provider-twilio
          --access public
          --no-git-checks
